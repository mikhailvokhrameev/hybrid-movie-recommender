services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recommender
      POSTGRES_USER: recommender
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recommender"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml:
    build: ./ml
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
      DEVICE: ${DEVICE:-cpu}
    volumes:
      - ollama_data:/root/.ollama
      - model_cache:/root/.cache
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 180s

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://recommender:${DB_PASSWORD:-changeme}@db:5432/recommender
      ML_SERVICE_URL: http://ml:8000
      DJANGO_SETTINGS_MODULE: recommender.settings
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      DEBUG: ${DEBUG:-0}
      SCORE_WEIGHT_SEMANTIC: ${SCORE_WEIGHT_SEMANTIC:-0.4}
      SCORE_WEIGHT_METADATA: ${SCORE_WEIGHT_METADATA:-0.3}
      SCORE_WEIGHT_SESSION: ${SCORE_WEIGHT_SESSION:-0.3}
    volumes:
      - ./catalog_okko.parquet:/app/catalog_okko.parquet:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py import_catalog --skip-existing &&
        uvicorn recommender.asgi:application --host 0.0.0.0 --port 8000
      "

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
  model_cache:
